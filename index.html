<!DOCTYPE html>
<html xmlns:widget="http://www.netvibes.com/ns/">
<head>
    <title>BOM Exporter Widget</title>

    <meta name="description" content="A widget to pull and export simplified BOM data." />
    <meta name="keywords" content="BOM, CSV, Export, 3DEXPERIENCE" />

    <link rel="stylesheet" type="text/css" href="https://uwa.3ds.com/latest/UWA.css" />
    <script type="text/javascript" src="https://uwa.3ds.com/latest/UWA.js"></script>

    <widget:preferences>
        <widget:preference name="targetPID" type="text" label="Assembly Physical ID" defaultValue="" />
    </widget:preferences>

    <style>
        body { font-family: 'Arial', sans-serif; padding: 10px; }
        .btn-export { background: #3d82e3; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        .btn-export:hover { background: #2a5eb0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div id="app-container">
        <input type="text" id="pidInput" placeholder="Enter Assembly PID..." style="width: 70%; padding: 5px;">
        <button class="btn-export" onclick="window.triggerBOMFetch()">Fetch BOM</button>
        <button class="btn-export" id="downloadBtn" style="display:none;" onclick="window.triggerCSVDownload()">Download CSV</button>
        
        <div id="status">Ready.</div>
        <div id="tableOutput"></div>
    </div>

    <script type="text/javascript">
        // 4. Main Widget Logic
        require([
            'DS/WAFData/WAFData',
            'DS/i3DXCompassPlatformServices/i3DXCompassPlatformServices'
        ], function(WAFData, i3DXCompassPlatformServices) {

            var myWidget = {
                data: [],

                onLoad: function() {
                    // Logic to execute when the widget is added to dashboard
                    document.getElementById('status').innerHTML = "Widget Loaded. Awaiting Input.";
                },

                fetchBOM: function() {
                    var pid = document.getElementById('pidInput').value || widget.getValue('targetPID');
                    if (!pid) return alert("Please provide a Physical ID");

                    document.getElementById('status').innerHTML = "Fetching data...";

                    i3DXCompassPlatformServices.getServiceUrl({
                        serviceName: '3DSpace',
                        onComplete: function(spaceUrl) {
                            var url = spaceUrl + "/resources/v1/modeler/dsprcs/dsprcs:Recipe/" + pid + "/dsprcs:Expand";
                            
                            WAFData.authenticatedRequest(url, {
                                method: 'GET',
                                onComplete: function(response) {
                                    var json = JSON.parse(response);
                                    myWidget.data = json.member || [];
                                    myWidget.render();
                                },
                                onFailure: function(err) {
                                    document.getElementById('status').innerHTML = "Error fetching BOM.";
                                    console.error(err);
                                }
                            });
                        }
                    });
                },

                render: function() {
                    var html = "<table><tr><th>Name</th><th>Rev</th><th>Qty</th></tr>";
                    this.data.forEach(function(item) {
                        html += "<tr><td>" + (item.title || 'N/A') + "</td><td>" + (item.revision || '-') + "</td><td>1</td></tr>";
                    });
                    html += "</table>";
                    
                    document.getElementById('tableOutput').innerHTML = html;
                    document.getElementById('status').innerHTML = "BOM Loaded.";
                    document.getElementById('downloadBtn').style.display = "inline-block";
                },

                download: function() {
                    var csv = "Name,Revision,Quantity\n";
                    this.data.forEach(function(row) {
                        csv += row.title + "," + row.revision + ",1\n";
                    });

                    var blob = new Blob([csv], { type: 'text/csv' });
                    var url = window.URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.setAttribute('href', url);
                    a.setAttribute('download', 'BOM_Export.csv');
                    a.click();
                }
            };

            // Global exposure for the HTML buttons
            window.triggerBOMFetch = myWidget.fetchBOM;
            window.triggerCSVDownload = myWidget.download;

            // Register the widget's lifecycle
            widget.addEvent('onLoad', myWidget.onLoad);
        });
    </script>
</body>
</html>
